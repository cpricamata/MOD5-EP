{% extends "MyInventoryApp/base.html" %}
{% block content %}
<h3>Add Water Bottle</h3>

<form>
    <table cellpadding = "20">
        <tr>
            <td><label for="sku">SKU:</label></td>
            <td><input type="text" name="sku" min="1"></td>
        </tr>
        <tr>
            <td><label for="brand">Brand:</label></td>
            <td><input type="text" name="brand"></td>
        </tr>
        <tr>
            <td><label for="cost">Cost:</label></td>
            <td><input type="number" name="cost" step="0.01" min="0"></td>
        </tr>
        <tr>
            <td><label for="size">Size (ml):</label></td>
            <td><input type="number" name="size" min="0"></td>
        </tr>
        <tr>
            <td><label for="mouth_size">Mouth Size (mm):</label></td>
            <td><input type="text" name="mouth_size"></td>
        </tr>
        <tr>
            <td><label for="color">Color:</label></td>
            <td><input type="text" name="color"></td>
        </tr>
        <tr>
            <td><label for="supplier">Supplier:</label></td>
            <td><input type="text" name="supplier"></td>
        </tr>
        <tr>
            <td><label for="current_quantity">Current Quantity:</label></td>
            <td><input type="number" name="current_quantity" min="0"></td>
        </tr>
    </table>
    <input type="submit" value="Add Bottle">
</form> 
 
{% endblock %}
