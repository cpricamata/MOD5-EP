<!DOCTYPE html>
<html>
<head>
    <title>My Inventory System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
        }

        header{
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav{
            background-color: #34495e;
            padding: 30px;
        }

        nav a{
            color: white;
            width: 75%;
            margin-right: 30px;
            text-decoration: none;
        }

        .container{
            padding: 20px;
            background: white;
            margin: 0px;
        }

        footer{
            text-align: center;
            padding: 10px;
            background: #2c3e50;
            color: white;
        }

        table {
            width: 75%;
            margin: 20px auto;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }
        
        table {
            width: 75%;
            margin-left: auto;
            margin-right: auto;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2; 
        }

        tr:nth-child(odd) {
            background-color: #ffffff; 
        }
    </style>
</head>

<body>

<header>
    <h1>My Inventory System</h1>
</header>

<nav>
    <a href="/">Home</a>
    <a href="/view_supplier">Suppliers</a>
    <a href="/view_bottles">Bottles</a>
    <a href="/add_bottle">Add Bottle</a>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer>
    <p>Inventory System 2026 by Bautista, Bernido and Ricamata</p>
</footer>

</body>
</html>
